<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Plan B Rentable</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0d1a;color:#e8e0cc;font-family:'DM Sans',system-ui,sans-serif;min-height:100vh}
:root{--gold:#c9a84c;--gold2:#a87c2a;--card:#12172b;--border:rgba(201,168,76,0.2);--muted:#8892a4;--err:#e05c5c;--ok:#4caf82}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:36px 32px;width:100%;max-width:360px;text-align:center}
.login-box h1{font-size:22px;font-weight:800;color:var(--gold);margin-bottom:6px}
.login-box p{font-size:13px;color:var(--muted);margin-bottom:24px}
input{width:100%;padding:13px 14px;border-radius:10px;border:2px solid var(--border);background:rgba(255,255,255,0.04);color:#e8e0cc;font-size:14px;outline:none;margin-bottom:12px;transition:border-color .2s}
input:focus{border-color:var(--gold)}
.btn{width:100%;padding:13px;border-radius:10px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;font-weight:700;font-size:14px;border:none;cursor:pointer}
.err{color:var(--err);font-size:12.5px;margin-top:10px;display:none}
.dash{display:none;padding:24px;max-width:1200px;margin:0 auto}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px}
.topbar h1{font-size:20px;font-weight:800;color:var(--gold)}
.btn-sm{padding:8px 16px;border-radius:8px;background:rgba(255,255,255,0.07);border:1px solid var(--border);color:var(--muted);font-size:12px;cursor:pointer;font-weight:600}
.btn-sm:hover{background:rgba(255,255,255,0.12);color:#e8e0cc}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:28px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 16px;text-align:center}
.stat-val{font-size:32px;font-weight:800;color:var(--gold);line-height:1}
.stat-label{font-size:11px;color:var(--muted);margin-top:6px;text-transform:uppercase;letter-spacing:0.5px}
.section-title{font-size:15px;font-weight:700;color:#e8e0cc;margin-bottom:14px}
.table-wrap{overflow-x:auto;border-radius:14px;border:1px solid var(--border);margin-bottom:28px}
table{width:100%;border-collapse:collapse}
th{background:rgba(201,168,76,0.08);color:var(--gold);font-size:11px;text-transform:uppercase;letter-spacing:0.5px;padding:12px 14px;text-align:left;white-space:nowrap}
td{padding:12px 14px;border-top:1px solid rgba(255,255,255,0.05);font-size:13px;vertical-align:middle}
tr:hover td{background:rgba(255,255,255,0.03)}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.badge-gold{background:rgba(201,168,76,0.15);color:var(--gold)}
.badge-blue{background:rgba(76,130,201,0.15);color:#6fa3e0}
.badge-err{background:rgba(224,92,92,0.15);color:var(--err)}
.pbar-wrap{display:flex;align-items:center;gap:8px}
.pbar-bg{flex:1;height:6px;border-radius:3px;background:rgba(255,255,255,0.08)}
.pbar-fill{height:6px;border-radius:3px;background:linear-gradient(90deg,var(--gold),var(--gold2))}
.pct-label{font-size:11px;color:var(--muted);min-width:30px}
.wa-link{color:var(--ok);text-decoration:none;font-size:12px;font-weight:600}
.codes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.code-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.code-val{font-size:13px;font-weight:700;font-family:monospace;color:var(--gold)}
.code-meta{font-size:11px;color:var(--muted);margin-top:4px}
.code-used{opacity:0.4}
.note{font-size:11px;color:var(--muted);text-align:center;margin-top:20px}
</style>
</head>
<body>

<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <h1>Plan B — Admin</h1>
    <p>Connectez-vous avec votre compte admin</p>
    <input type="email" id="email" placeholder="Email" onkeydown="if(event.key==='Enter')document.getElementById('pass').focus()">
    <input type="password" id="pass" placeholder="Mot de passe" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn" id="loginBtn" onclick="doLogin()">Accéder →</button>
    <div class="err" id="loginErr">Email ou mot de passe incorrect.</div>
  </div>
</div>

<div class="dash" id="dash">
  <div class="topbar">
    <h1>Dashboard — Plan B Rentable</h1>
    <div style="display:flex;gap:8px">
      <button class="btn-sm" onclick="loadData()">↺ Actualiser</button>
      <a href="/PlanBRentable.html" class="btn-sm" style="text-decoration:none">← Retour à l'app</a>
      <button class="btn-sm" onclick="doLogout()">Déconnexion</button>
    </div>
  </div>
  <div class="stats-grid" id="statsGrid"></div>
  <div class="section-title">Clients activés</div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Nom</th><th>Email</th><th>WhatsApp</th><th>Accès</th>
          <th>Activé le</th><th>Expire</th><th>Progression</th><th>Phase</th>
        </tr>
      </thead>
      <tbody id="clientsBody"></tbody>
    </table>
  </div>
  <div class="section-title">Codes d'accès</div>
  <div class="codes-grid" id="codesGrid"></div>
  <div class="note" id="lastUpdate"></div>
</div>

<script>
const SUPABASE_URL = 'https://ggeohumiyxqhknnftydi.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdnZW9odW1peXhxaGtubmZ0eWRpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDU0MjcwMzMsImV4cCI6MjA2MTAwMzAzM30.r_r2MXk_9nRjBnCkHG6m06LBB_wfHOdlHtZ7q3C750';
let _token = '';

// Auto-login si déjà connecté via l'app
(async () => {
  try {
    const _supa = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const { data: { session } } = await _supa.auth.getSession();
    if (session?.access_token) {
      _token = session.access_token;
      await loadData();
    }
  } catch(e) {}
})();

async function doLogin(){
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('pass').value;
  const btn   = document.getElementById('loginBtn');
  const err   = document.getElementById('loginErr');
  if(!email || !pass) return;
  btn.textContent = 'Connexion…'; btn.disabled = true; err.style.display = 'none';
  try {
    const res  = await fetch('/api/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email, password: pass})
    });
    const data = await res.json();
    if(!data.ok){ err.style.display = 'block'; btn.textContent = 'Accéder →'; btn.disabled = false; return; }
    if(!data.profile?.is_admin){ err.textContent = 'Accès non autorisé.'; err.style.display = 'block'; btn.textContent = 'Accéder →'; btn.disabled = false; return; }
    _token = data.session.access_token;
    btn.textContent = 'Accéder →'; btn.disabled = false;
    loadData();
  } catch(e){ err.style.display = 'block'; btn.textContent = 'Accéder →'; btn.disabled = false; }
}

function doLogout(){
  _token = '';
  document.getElementById('dash').style.display = 'none';
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('pass').value = '';
}

async function loadData(){
  try {
    const res  = await fetch('/api/admin', { headers: {'Authorization': `Bearer ${_token}`} });
    const data = await res.json();
    if(!data.ok){ doLogout(); return; }
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('dash').style.display = 'block';
    renderStats(data.stats);
    renderClients(data.clients);
    renderCodes(data.codes);
    document.getElementById('lastUpdate').textContent = 'Mis à jour : ' + new Date().toLocaleString('fr-FR');
  } catch(e){ alert('Erreur réseau.'); }
}

function renderStats(s){
  document.getElementById('statsGrid').innerHTML = [
    {val: s.total_clients, label: 'Clients actifs'},
    {val: s.fondateur,     label: 'Accès Fondateur'},
    {val: s.trente_jours,  label: 'Accès 30 jours'},
    {val: s.expired,       label: 'Expirés'},
    {val: s.codes_used,    label: 'Codes utilisés'},
    {val: s.codes_available, label: 'Codes dispo'},
  ].map(i=>`<div class="stat-card"><div class="stat-val">${i.val}</div><div class="stat-label">${i.label}</div></div>`).join('');
}

function renderClients(clients){
  if(!clients.length){ document.getElementById('clientsBody').innerHTML='<tr><td colspan="8" style="text-align:center;color:var(--muted);padding:24px">Aucun client activé.</td></tr>'; return; }
  document.getElementById('clientsBody').innerHTML = clients.map(c=>{
    const expired = c.expires_at && new Date(c.expires_at) < new Date();
    const badge = c.access_type === 'planb_30_days'
      ? `<span class="badge ${expired?'badge-err':'badge-blue'}">${expired?'Expiré':'30 jours'}</span>`
      : `<span class="badge badge-gold">Fondateur</span>`;
    const wa = c.whatsapp !== '—'
      ? `<a class="wa-link" href="https://wa.me/${c.whatsapp.replace(/\D/g,'')}" target="_blank">💬 ${c.whatsapp}</a>`
      : '—';
    return `<tr>
      <td style="font-weight:600">${c.name}</td>
      <td style="color:var(--muted);font-size:12px">${c.email}</td>
      <td>${wa}</td>
      <td>${badge}</td>
      <td style="color:var(--muted)">${c.activated_at ? new Date(c.activated_at).toLocaleDateString('fr-FR') : '—'}</td>
      <td style="color:var(--muted)">${c.expires_at ? new Date(c.expires_at).toLocaleDateString('fr-FR') : 'À vie'}</td>
      <td><div class="pbar-wrap"><div class="pbar-bg"><div class="pbar-fill" style="width:${c.pct}%"></div></div><span class="pct-label">${c.pct}%</span></div></td>
      <td style="color:var(--muted);font-size:12px">${c.currentPhase}</td>
    </tr>`;
  }).join('');
}

function renderCodes(codes){
  document.getElementById('codesGrid').innerHTML = (Array.isArray(codes)?codes:[]).map(c=>`
    <div class="code-card ${c.used_by?'code-used':''}">
      <div class="code-val">${c.code}</div>
      <div class="code-meta">${c.access_type==='planb_30_days'?'30 jours':'Fondateur'} — ${c.used_by?'✓ Utilisé':'○ Disponible'}</div>
    </div>`).join('');
}
</script>
</body>
</html>
