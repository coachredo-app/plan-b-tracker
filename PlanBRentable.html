<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0d1b2a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="description" content="Plan B Rentable — Trouve et lance ton activité parallèle en 90 jours">
<title>Plan B Rentable — Coach Redouane</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#0d1b2a;--navy2:#142338;--card:#1a2f4a;
  --gold:#c9a84c;--gold2:#e8c068;
  --text:#e8e8e8;--muted:#7a8fa6;
  --ok:#4caf50;--err:#e53935;--r:14px;
}
html,body{height:100%;background:var(--navy);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:15px;line-height:1.5;overscroll-behavior:none}
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative}

/* ---- TOP BAR ---- */
.topbar{background:var(--navy2);padding:10px 16px 8px;position:sticky;top:0;z-index:20;border-bottom:1px solid #1e3350}
.topbar-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.topbar-title{font-size:12px;color:var(--gold);font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.topbar-phase{font-size:11px;color:var(--muted)}
.pbar{height:3px;background:#1e3350;border-radius:2px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:2px;transition:width .5s ease}

/* ---- COACH BUBBLE ---- */
.coach-wrap{display:flex;gap:10px;padding:14px 16px 6px;align-items:flex-start}
.cavatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:var(--navy);flex-shrink:0;box-shadow:0 2px 8px #c9a84c44}
.cbubble{background:var(--card);border-radius:0 var(--r) var(--r) var(--r);padding:11px 14px;font-size:13.5px;color:var(--text);line-height:1.65;border:1px solid #1e3350;flex:1}
.cbubble b{color:var(--gold2)}
.cbubble i{color:var(--gold);font-style:normal}

/* ---- CONTENT ---- */
.content{flex:1;padding:6px 16px 16px;display:flex;flex-direction:column;gap:11px;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:80px}

/* ---- CARDS ---- */
.card{background:var(--card);border-radius:var(--r);padding:15px;border:1px solid #1e3350}
.ctitle{font-size:11px;color:var(--gold);font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:9px}

/* ---- INPUTS ---- */
label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;margin-top:8px}
label:first-child{margin-top:0}
textarea,input[type=text],input[type=number]{width:100%;background:#0a1520;border:1px solid #1e3350;border-radius:10px;padding:10px 12px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color .2s;resize:none}
textarea:focus,input:focus{border-color:var(--gold)}
textarea{min-height:75px;line-height:1.5}

/* ---- BUTTONS ---- */
.btn{display:block;width:100%;padding:13px;border:none;border-radius:11px;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .15s,transform .1s;font-family:inherit;letter-spacing:.2px}
.btn:active{transform:scale(.97)}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--navy)}
.btn-outline{background:transparent;color:var(--gold);border:1.5px solid var(--gold)}
.btn-muted{background:var(--card);color:var(--muted);border:1px solid #1e3350}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.btn-sm{padding:9px 16px;font-size:13px;border-radius:9px;width:auto;display:inline-block}

/* ---- NAV ---- */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;display:flex;gap:8px;padding:10px 16px 14px;background:var(--navy);border-top:1px solid #1e3350;z-index:20}
.nav .btn{margin:0;flex:1}
.nav .btn-muted{flex:0 0 auto;width:auto;padding:13px 16px}

/* ---- QUIZ ---- */
.quiz-q{font-size:15.5px;font-weight:600;margin-bottom:13px;line-height:1.55}
.qopt{display:block;width:100%;background:#0a1520;border:1.5px solid #1e3350;border-radius:10px;padding:11px 14px;color:var(--text);font-size:13.5px;text-align:left;cursor:pointer;margin-bottom:7px;transition:all .2s;font-family:inherit;line-height:1.4}
.qopt:hover:not(:disabled){border-color:var(--gold);background:#142338}
.qopt.correct{border-color:var(--ok);background:#1b3a1b;color:#a5d6a7}
.qopt.wrong{border-color:var(--err);background:#3a1b1b;color:#ef9a9a}
.qopt.show-ok{border-color:var(--ok)}
.qopt:disabled{cursor:default}
.explain{background:#142338;border-radius:10px;padding:11px;font-size:13px;border-left:3px solid var(--gold);margin-top:3px;line-height:1.6;color:#cdd9e5}
.quiz-counter{font-size:12px;color:var(--muted);margin-bottom:4px}

/* ---- SCORE ---- */
.score-ring{width:110px;height:110px;border-radius:50%;border:5px solid var(--gold);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:8px auto 14px}
.score-ring.fail{border-color:var(--err)}
.snum{font-size:30px;font-weight:800;color:var(--gold);line-height:1}
.score-ring.fail .snum{color:var(--err)}
.slabel{font-size:11px;color:var(--muted);margin-top:2px}

/* ---- STARS ---- */
.stars-row{display:flex;gap:4px;margin-top:5px}
.star{font-size:20px;cursor:pointer;color:#1e3350;transition:color .1s;padding:2px;user-select:none}
.star.on{color:var(--gold)}

/* ---- BOOL TOGGLE ---- */
.bool-row{display:flex;gap:8px;margin-top:4px}
.bool-btn{flex:1;padding:11px;border-radius:10px;border:2px solid #1e3350;background:#0a1520;color:var(--text);font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
.bool-btn.yes.sel{border-color:var(--ok);background:#1b3a1b;color:#a5d6a7}
.bool-btn.no.sel{border-color:var(--err);background:#3a1b1b;color:#ef9a9a}

/* ---- CHECKLIST ---- */
.cl-cat{font-size:11px;color:var(--gold);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin:10px 0 5px}
.cl-item{display:flex;align-items:flex-start;gap:10px;padding:9px 11px;border-radius:10px;background:#0a1520;border:1.5px solid #1e3350;margin-bottom:5px;cursor:pointer;transition:all .2s}
.cl-item.chk{border-color:var(--gold);background:#1a2d10}
.cl-box{width:19px;height:19px;border-radius:5px;border:2px solid #1e3350;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .2s;font-size:11px}
.cl-item.chk .cl-box{background:var(--gold);border-color:var(--gold);color:var(--navy)}
.cl-text{font-size:13px;line-height:1.5}
.cl-score-bar{background:#1e3350;border-radius:10px;height:6px;overflow:hidden;margin-top:6px}
.cl-score-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width .4s ease}
.cl-score-label{font-size:12px;color:var(--muted);margin-top:4px;text-align:right}

/* ---- WEEK CARDS ---- */
.week-grid{display:flex;flex-direction:column;gap:7px}
.wcard{display:flex;align-items:center;gap:11px;background:var(--card);border-radius:12px;padding:13px;border:1.5px solid #1e3350;cursor:pointer;transition:all .2s}
.wcard.active{border-color:var(--gold);background:#1a2a3a}
.wcard.done{border-color:var(--ok)}
.wcard.locked{opacity:.4;cursor:not-allowed}
.wnum{width:34px;height:34px;border-radius:50%;background:#1e3350;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:var(--muted);flex-shrink:0}
.wcard.active .wnum{background:var(--gold);color:var(--navy)}
.wcard.done .wnum{background:var(--ok);color:#fff}
.winfo{flex:1}
.wtitle{font-size:13.5px;font-weight:600}
.wphase{font-size:11px;color:var(--muted);margin-top:1px}
.wkpi{font-size:11px;color:var(--gold);margin-top:2px}
.wstatus{font-size:11px;color:var(--ok)}

/* ---- IDEAS ---- */
.idea-card{background:#0a1520;border:1.5px solid #1e3350;border-radius:10px;padding:12px;margin-bottom:8px;cursor:pointer;transition:all .2s}
.idea-card:hover{border-color:var(--gold);background:#142338}
.idea-card.sel{border-color:var(--ok);background:#1a2d10}
.idea-name{font-size:14px;font-weight:600;color:var(--gold2);margin-bottom:3px}
.idea-desc{font-size:12px;color:var(--muted);line-height:1.5}
.idea-tool{font-size:11px;color:#546e7a;margin-top:4px}

/* ---- IDEA SCORES ---- */
.idea-score-wrap{border:1px solid #1e3350;border-radius:10px;padding:12px;margin-bottom:8px;background:#0a1520}
.isw-title{font-size:13px;font-weight:600;margin-bottom:8px}
.crit-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.crit-box{padding:8px;border-radius:8px;background:#142338;border:1px solid #1e3350}
.crit-name{font-size:10px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}

/* ---- REVENUE TABLE ---- */
.rev-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:5px;margin-bottom:5px}
.rev-cell{background:#0a1520;border:1px solid #1e3350;border-radius:7px;padding:7px 8px;font-size:12px;text-align:center}
.rev-cell.hdr{color:var(--gold);font-weight:600;font-size:10px;text-transform:uppercase}
.rev-total{color:var(--ok);font-weight:700}

/* ---- REPORT ---- */
.rep-section{background:var(--card);border-radius:var(--r);padding:14px;border:1px solid #1e3350;margin-bottom:9px}
.rep-title{font-size:11px;color:var(--gold);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:9px}
.rep-row{display:flex;justify-content:space-between;align-items:flex-start;font-size:13px;padding:5px 0;border-bottom:1px solid #1e3350;gap:8px}
.rep-row:last-child{border:none}
.rep-row span{color:var(--muted);flex-shrink:0}
.rep-row strong{color:var(--text);text-align:right}

/* ---- BADGE ---- */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.3px}
.badge-gold{background:#2a1e06;color:var(--gold);border:1px solid var(--gold)}
.badge-ok{background:#1b3a1b;color:#a5d6a7;border:1px solid var(--ok)}
.badge-muted{background:#1e3350;color:var(--muted)}

/* ---- WELCOME ---- */
.hero{text-align:center;padding:32px 16px 16px}
.hero-logo{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:var(--navy);margin:0 auto 16px;box-shadow:0 4px 20px #c9a84c44}
.hero-title{font-size:22px;font-weight:800;margin-bottom:6px}
.hero-sub{font-size:13.5px;color:var(--muted);line-height:1.6;margin-bottom:20px}
.step-list{text-align:left;margin-bottom:20px}
.step-li{display:flex;gap:11px;align-items:flex-start;margin-bottom:10px}
.step-ico{width:30px;height:30px;border-radius:50%;background:var(--card);border:1px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.step-txt{font-size:13px;color:var(--text);padding-top:4px}
.step-txt small{display:block;color:var(--muted);font-size:12px}
.progress-resume{background:var(--card);border-radius:var(--r);padding:14px;border:1px solid var(--gold);margin-bottom:12px}
.pr-title{font-size:12px;color:var(--gold);font-weight:600;margin-bottom:6px}
.pr-pct{font-size:28px;font-weight:800;color:var(--gold2)}
.pr-label{font-size:12px;color:var(--muted)}

/* ---- ANIM ---- */
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.content{animation:fi .25s ease}
@keyframes gateIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes goldPulse{0%{box-shadow:0 0 0 0 rgba(201,168,76,0.4)}70%{box-shadow:0 0 0 8px rgba(201,168,76,0)}100%{box-shadow:0 0 0 0 rgba(201,168,76,0)}}
.gate-card{animation:gateIn .35s cubic-bezier(.22,.68,0,1.2)}
.gate-btn{transition:transform .18s ease,box-shadow .18s ease,filter .18s ease}
.gate-btn:hover{transform:translateY(-2px);box-shadow:0 6px 22px rgba(201,168,76,0.35);filter:brightness(1.07)}
.gate-btn:active{transform:scale(.97) translateY(0)}

/* ---- TOAST ---- */
.toast{position:fixed;bottom:85px;left:50%;transform:translateX(-50%);background:var(--gold);color:var(--navy);padding:9px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:99;white-space:nowrap;animation:fi .2s ease;pointer-events:none}

/* ---- DIVIDER ---- */
.divider{height:1px;background:#1e3350;margin:4px 0}

/* ---- CONTACT LIST ---- */
.contact-row{display:flex;gap:8px;align-items:center;margin-bottom:7px}
.contact-num{width:26px;height:26px;border-radius:50%;background:var(--card);border:1px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--gold);flex-shrink:0}
.contact-row input{flex:1;margin:0}

/* ---- PLAN SECOURS ---- */
.secours{background:#1e1a0a;border:1px solid var(--gold);border-radius:var(--r);padding:13px}
.secours-title{font-size:12px;color:var(--gold);font-weight:700;margin-bottom:8px}
.secours li{font-size:13px;color:var(--text);margin-left:16px;margin-bottom:4px;line-height:1.5}

/* ---- ACTION ITEMS ---- */
.action-item{display:flex;gap:10px;align-items:flex-start;padding:9px 11px;border-radius:10px;background:#0a1520;border:1.5px solid #1e3350;margin-bottom:6px;cursor:pointer;transition:all .2s}
.action-item.done{border-color:var(--ok);background:#1a2d10}
.abox{width:20px;height:20px;border-radius:5px;border:2px solid #1e3350;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:11px;margin-top:1px}
.action-item.done .abox{background:var(--ok);border-color:var(--ok);color:#fff}
.atext{font-size:13.5px;line-height:1.5;flex:1}

/* ---- STATS ---- */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.stat-box{background:#0a1520;border:1px solid #1e3350;border-radius:10px;padding:12px;text-align:center}
.stat-num{font-size:22px;font-weight:800;color:var(--gold2);line-height:1}
.stat-label{font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.3px}
.stat-box.ok .stat-num{color:var(--ok)}

/* ---- PROFILE ---- */
.prof-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #1e3350;font-size:13px}
.prof-row:last-child{border:none}
.prof-label{color:var(--muted);flex-shrink:0}
.prof-value{color:var(--text);font-weight:600;text-align:right;margin-left:8px}
.topbar-row .icon-btn{background:none;border:none;color:var(--gold);font-size:18px;cursor:pointer;padding:0 0 0 8px;line-height:1}

/* ---- MSG PRESENTATION ---- */
.msg-preview{background:#0a1520;border-radius:10px;padding:12px;border-left:3px solid var(--gold);font-size:13px;line-height:1.65;color:var(--text);margin-top:8px}

/* ---- PRINT ---- */
@media print{
  .topbar,.nav,.coach-wrap,.no-print{display:none!important}
  body{background:#fff;color:#000}
  .content{padding-bottom:0;animation:none}
  .card,.rep-section{border:1px solid #ccc;background:#f9f9f9;break-inside:avoid}
  .ctitle,.rep-title{color:#555}
  .rep-row span{color:#555}
  .rep-row strong{color:#000}
}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<body>
<div id="app"><div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0d1b2a"><div style="width:44px;height:44px;border-radius:50%;border:3px solid #1e3350;border-top-color:#c9a84c;animation:spin .8s linear infinite"></div></div></div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>

<script>
'use strict';

/* ════════════════════════════════════════
   CONSTANTS
════════════════════════════════════════ */

const QUIZ = [
  {q:"Combien d'angles doit-on croiser pour trouver son Plan B selon la méthode ?",opts:["2 — compétences + passion","3 — compétences + besoins autour de toi + ce qui se vend","4 — compétences + capital + marché + réseau","1 — ce qui te passionne le plus"],ans:1,exp:"La Méthode 3 Angles croise : tes compétences naturelles, les besoins autour de toi, et ce qui se vend concrètement dans ton environnement. C'est ce croisement qui révèle une idée viable."},
  {q:"Qu'est-ce que l'Heure d'Or dans le Plan B Rentable ?",opts:["L'heure où tu fais ta première vente","Le meilleur moment pour publier sur WhatsApp","60 minutes dédiées chaque jour exclusivement à ton Plan B","Une séance de méditation matinale pour te motiver"],ans:2,exp:"L'Heure d'Or = 60 minutes par jour réservées uniquement à ton Plan B. C'est ton investissement quotidien non-négociable. Pas besoin de plus — juste la constance."},
  {q:"Que signifie 'tester avec un MVP' dans le contexte du Plan B ?",opts:["Créer un produit parfait avant toute vente","Attendre d'avoir du capital pour bien démarrer","Faire une grande campagne publicitaire dès le lancement","Proposer la version la plus simple de ton idée pour tester rapidement"],ans:3,exp:"MVP = version minimale viable. Tu proposes la forme la plus simple et rapide de ton idée. Tu testes d'abord, tu améliores après. Jamais l'inverse."},
  {q:"Quel est l'objectif principal des 30 premiers jours du plan ?",opts:["Créer un site web professionnel","Avoir 100 abonnés sur Facebook","Recevoir au moins 1 paiement, peu importe le montant","Quitter ton emploi actuel"],ans:2,exp:"Le premier paiement est la preuve que ton idée est viable dans le monde réel. Le montant n'a aucune importance — c'est le signal qui compte. Il change tout psychologiquement."},
  {q:"Quel outil est principalement recommandé pour ta visibilité au départ ?",opts:["Instagram Reels","YouTube","LinkedIn professionnel","WhatsApp"],ans:3,exp:"WhatsApp est l'outil de départ par excellence. Tu as déjà tes contacts, c'est gratuit, les messages sont lus, et les réponses arrivent. Commence là avant tout autre réseau."},
  {q:"Selon la règle d'or du plan, que dois-tu faire AVANT d'améliorer ton offre ?",opts:["La parfaire pendant 3 mois minimum","Demander l'avis de 50 personnes","La tester d'abord, même imparfaite","Baisser ton prix au maximum pour attirer"],ans:2,exp:"\"Tu n'essaies pas d'améliorer avant d'avoir testé.\" C'est une règle fondamentale. Une offre imparfaite testée vaut infiniment plus qu'une offre parfaite jamais lancée."},
  {q:"Combien de semaines dure le Test des 90 jours ?",opts:["8 semaines","10 semaines","12 semaines","16 semaines"],ans:2,exp:"90 jours = 12 semaines divisées en 3 phases : S1-S4 Lancer (obtenir le premier paiement), S5-S8 Répéter (structurer), S9-S12 Optimiser (consolider et grandir)."},
  {q:"Quel est l'indicateur de réussite minimal de la Semaine 1 ?",opts:["Avoir fait ta première vente","Avoir publié 10 fois sur les réseaux sociaux","Avoir créé un logo et une page Facebook","Avoir listé 10 personnes à contacter"],ans:3,exp:"Si tu as 10 noms écrits à la fin de la Semaine 1, c'est réussi. Simple, concret, mesurable. Ces 10 personnes sont ta première audience."},
  {q:"Si tu n'as rien vendu après 30 jours, que recommande le plan ?",opts:["Changer complètement d'idée et recommencer","Faire une pause de 2 semaines pour récupérer","Abandonner et réessayer dans 6 mois","Ajuster l'offre, augmenter les contacts, ne pas abandonner"],ans:3,exp:"\"Tu n'as pas échoué. Tu ajustes.\" Questions à se poser : Ai-je contacté assez de personnes ? Mon offre est-elle claire ? Ai-je vraiment proposé ? Le plan de secours est dans le bonus 3."},
  {q:"Pourquoi séparer l'argent personnel et professionnel dès le début ?",opts:["C'est obligatoire par la loi","Pour impressionner tes premiers clients","Pour voir clairement ce que ton Plan B génère et décider en connaissance de cause","Pour payer moins d'impôts"],ans:2,exp:"Mélanger les deux = confusion totale. Tu ne sais plus si tu gagnes ou perds. Séparer = tu vois exactement combien ton Plan B génère chaque mois et tu peux ajuster intelligemment."}
];

const CHECKLIST = [
  {cat:"Clarté de l'idée", items:[
    "Mon idée est précise — pas vague (pas juste 'faire du commerce')",
    "Je peux expliquer mon activité en une seule phrase simple",
    "Je sais qui sont mes clients potentiels (profil précis)",
    "Je connais le bénéfice concret que j'apporte à mes clients",
    "Mon idée correspond à une vraie demande autour de moi"
  ]},
  {cat:"Faisabilité", items:[
    "Je peux démarrer sans gros capital (ou avec très peu)",
    "J'ai au moins 1 heure par jour disponible pour mon Plan B",
    "J'ai les compétences de base ou je peux les acquérir rapidement",
    "Je peux tester mon idée dans les 7 prochains jours",
    "Je n'ai pas besoin d'infrastructures complexes pour commencer"
  ]},
  {cat:"Marché et demande", items:[
    "Des personnes autour de moi ont réellement ce besoin",

function getSector(t) {
  if(!t) return 'default';
  t = t.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  if(/dans|danc|choreo|ballet|hip.?hop|afrobeat|zumba|salsa|kizomba|danse/i.test(t)) return 'danse';
  if(/music|chant|guitare|piano|djembe|djing|\bdj\b|beatmaker|rap|chanson|melodie|instrument/i.test(t)) return 'musique';
  if(/fitness|sport|musculation|coach.sport|nutrition|regime|entrainement|running/i.test(t)) return 'sport';
  if(/coiffure|maquillage|beaute|ongle|nail|esthetique|soin.capillaire|tresse|locks/i.test(t)) return 'beaute';
  if(/code|dev|web|app|informatique|montage.video|design|graphisme|canva|cv\b|linkedin/i.test(t)) return 'tech';
  if(/cuisine|patisserie|traiteur|gateau|repas|livraison.repas|restauration/i.test(t)) return 'cuisine';
  if(/couture|tissu|wax|pagne|tailleur|broderie|confection|vetement/i.test(t)) return 'couture';
  return 'default';
}

async function fetchProfile(uid){
  if(!_supa) return null;
  try {
    const { data, error } = await _supa.from('profiles').select('*').eq('id', uid).single();
    if(error) console.error('[fetchProfile]', error);
    return data || null;
  } catch(e){

  }
}

function daysLeft(){

  const remaining = Math.ceil((new Date(_profile.expires_at) - new Date()) / DAY_MS);
  return Math.max(0, remaining);
}

// Boot initial — getSession() est explicite et fiable pour le premier rendu.
// onAuthStateChange gère uniquement les changements post-boot.
async function _boot(){
  if(!_supa){ render(); return; }
  try {
    const { data: { session } } = await _supa.auth.getSession();
    _session = session;
    if(session) _profile = await fetchProfile(session.user.id);
  } catch(e){
    console.error('[boot]', e);
    _session = null; _profile = null;
  }
  render();
}

// Changements auth post-boot (login, logout, refresh token)
// INITIAL_SESSION est ignoré : géré par _boot()
if(_supa){
  _supa.auth.onAuthStateChange(async (event, session) => {
    if(event === 'INITIAL_SESSION') return;
    try {
      _session = session;
      _profile = session ? await fetchProfile(session.user.id) : null;
    } catch(e){
      console.error('[onAuthStateChange]', e);
      _session = null; _profile = null;
    }
    render();
  });
}

window.loginUser = async function(){
  if(!_supa){ _showErr('loginError','Service indisponible. Rechargez la page.'); return; }
  const btn = document.getElementById('loginBtn');
  if(btn){ btn.disabled=true; btn.textContent='Connexion…'; }
  const email    = (document.getElementById('loginEmail')?.value||'').trim();
  const password = document.getElementById('loginPassword')?.value||'';
  if(!email||!password){
    _showErr('loginError','Remplissez les deux champs.');
    if(btn){ btn.disabled=false; btn.textContent='Se connecter →'; } return;
  }
  const { error } = await _supa.auth.signInWithPassword({ email, password });
  if(error){
    const msg = (error.message||'').toLowerCase().includes('invalid')
      ? 'Email ou mot de passe incorrect.' : error.message;
    _showErr('loginError', msg);
    if(btn){ btn.disabled=false; btn.textContent='Se connecter →'; }
  }
  // Succès → onAuthStateChange déclenche render()
};

window.signupUser = async function(){
  if(!_supa){ _showErr('signupError','Service indisponible. Rechargez la page.'); return; }
  const btn = document.getElementById('signupBtn');
  if(btn){ btn.disabled=true; btn.textContent='Création…'; }
  const name     = (document.getElementById('signupName')?.value||'').trim();
  const email    = (document.getElementById('signupEmail')?.value||'').trim();
  const password = document.getElementById('signupPassword')?.value||'';
  const whatsapp = (document.getElementById('signupWhatsapp')?.value||'').trim();
  if(!name||!email||!password){
    _showErr('signupError','Prénom, email et mot de passe sont obligatoires.');
    if(btn){ btn.disabled=false; btn.textContent='Créer mon compte →'; } return;
  }
  if(password.length < 8){
    _showErr('signupError','Mot de passe : 8 caractères minimum.');
    if(btn){ btn.disabled=false; btn.textContent='Créer mon compte →'; } return;
  }
  const { error } = await _supa.auth.signUp({
    email, password, options:{ data:{ name, whatsapp } }
  });
  if(error){
    const msg = (error.message||'').toLowerCase().includes('already')
      ? 'Un compte existe déjà avec cet email.' : error.message;
    _showErr('signupError', msg);
    if(btn){ btn.disabled=false; btn.textContent='Créer mon compte →'; }
  } else {
    const ok = document.getElementById('signupSuccess');
    if(ok){ ok.textContent='✓ Compte créé ! Vérifiez votre email pour confirmer.'; ok.style.display='block'; }
    if(btn){ btn.disabled=false; btn.textContent='Créer mon compte →'; }
  }
};

window.submitCode = async function(){
  const btn = document.getElementById('codeBtn');
  if(btn){ btn.disabled=true; btn.textContent='Vérification…'; }

  try {
    const val = (document.getElementById('accessInput')?.value||'').trim().toUpperCase();
    if(!val){
      _showErr('accessError','Entrez votre code d\'accès.');
      return;
    }

    // 1 — Vérifier que le code existe et n'est pas encore utilisé
    const { data: code, error: selectErr } = await _supa
      .from('access_codes')
      .select('id,access_type')
      .eq('code', val)
      .is('used_by', null)
      .maybeSingle();

    if(selectErr){
      console.error('[submitCode] SELECT error:', selectErr);
      _showErr('accessError','Erreur réseau. Réessayez dans quelques secondes.');
      return;
    }
    if(!code){
      _showErr('accessError','Code invalide ou déjà utilisé. Vérifiez votre message WhatsApp.');
      return;
    }

    const now      = new Date().toISOString();
    const expiresAt = code.access_type === 'planb_30_days'
      ? new Date(Date.now() + 30 * DAY_MS).toISOString() : null;

    // 2 — Réclamer le code (UPDATE simple, sans filtre IS NULL sur RETURNING)
    const { error: claimErr } = await _supa
      .from('access_codes')
      .update({ used_by: _session.user.id, used_at: now })
      .eq('id', code.id);

    if(claimErr){
      console.error('[submitCode] UPDATE access_codes error:', claimErr);
      _showErr('accessError','Activation bloquée. Contactez-nous sur WhatsApp.');
      return;
    }

    // 3 — Mettre à jour le profil utilisateur
    const { error: profileErr } = await _supa
      .from('profiles')
      .update({ access_type: code.access_type, activated_at: now, expires_at: expiresAt })
      .eq('id', _session.user.id);

    if(profileErr){
      console.error('[submitCode] UPDATE profiles error:', profileErr);
      _showErr('accessError','Profil non mis à jour. Contactez-nous sur WhatsApp.');
      return;
    }

    // 4 — Rafraîchir le profil et rediriger vers l'app
    _profile = await fetchProfile(_session.user.id);
    render();

  } catch(e){
    console.error('[submitCode] Exception inattendue:', e);
    _showErr('accessError','Erreur inattendue. Rechargez la page et réessayez.');
  } finally {
    // Toujours réactiver le bouton, même en cas d'exception
    if(btn){ btn.disabled=false; btn.textContent='Débloquer mon accès →'; }
  }
};

function renderQuiz(){
  const qi = S.quiz.q;
  const q = QUIZ[qi];
  const ans = S.quiz.answers[qi];
  const answered = ans !== undefined;
  const correct = q.ans;
  const pct = Math.round((qi/10)*40)+5;

  let optsHtml = q.opts.map((o,i)=>{
    let cls = '';
    if(answered){
      if(i===correct) cls='correct';
      else if(i===ans && ans!==correct) cls='wrong';
    }
    return `<button class="qopt ${cls}" onclick="${answered?'':'selectAnswer('+i+')'}" ${answered?'disabled':''}>${o}</button>`;
  }).join('');

  let explainHtml = answered ? `<div class="explain">${ans===correct?'✅':'❌'} ${q.exp}</div>` : '';

  return topbar('Quiz','Phase 0 — Quiz',pct) +
  coach(qi===0 ? `Avant de commencer, je dois m'assurer que tu as bien compris le livre. <b>10 questions</b> t'attendent. Score minimum pour continuer : <i>7/10</i>. Si tu n'as pas encore lu le livre, fais-le d'abord — ça changera tout.` : `Question ${qi+1}/10 — Continue, tu es sur la bonne voie.`) +
  `<div class="content">
    <div class="card">
      <div class="quiz-counter">Question ${qi+1} / ${QUIZ.length}</div>
      <div class="quiz-q">${q.q}</div>
      ${optsHtml}
      ${explainHtml}
    </div>
  </div>` +
  (answered ? `<div class="nav"><button class="btn btn-gold" onclick="nextQuizQ()">${qi<QUIZ.length-1?'Question suivante →':'Voir mon résultat'}</button></div>` : '');
}

window.selectAnswer = function(i){
  const qi = S.quiz.q;
  S.quiz.answers[qi] = i;
  if(i===QUIZ[qi].ans) S.quiz.score++;
  save(); render();
};

window.nextQuizQ = function(){
  if(S.quiz.q < QUIZ.length-1){
    S.quiz.q++;
    S.quiz.answers[S.quiz.q] = undefined;
    save(); render();
  } else {
    S.quiz.passed = S.quiz.score >= 7;
    S.screen = 'quiz-result';
    save(); render();
  }
};

// P1 Step 5: 5 ideas + scoring
function renderP1S5(){
  const scores = S.p1.ideaScores;
  const ideas = S.p1.ideas;

  let ideasHtml = ideas.map((idea,i)=>{
    const sc = scores[i]||{t:0,c:0,s:0,d:0};
    const total = sc.t+sc.c+sc.s+sc.d;
    const critNames = ['Temps','Coût','Compét.','Demande'];
    const critKeys = ['t','c','s','d'];
    const critDescs = ['Temps dispo','Faible coût','Compétences','Demande locale'];
    return `<div class="idea-score-wrap">
      <label>Idée ${i+1} :</label>
      <input type="text" id="idea${i}" value="${idea}" placeholder="Ex: Cours de danse, Service livraison, Coiffure..." oninput="saveIdeaText(${i},this.value)">
      <div style="margin-top:8px">
        <div class="crit-grid">
          ${critKeys.map((k,ci)=>`<div class="crit-box">
            <div class="crit-name">${critDescs[ci]}</div>
            <div class="stars-row">
              ${[1,2,3,4,5].map(v=>`<span class="star ${sc[k]>=v?'on':''}" onclick="setStar(${i},'${k}',${v})">★</span>`).join('')}
            </div>
          </div>`).join('')}
        </div>
        <div style="margin-top:6px;font-size:12px;color:var(--muted);text-align:right">Score total : <b style="color:${total>=14?'var(--ok)':total>=8?'var(--gold)':'var(--err)'}">${total}/20</b></div>
      </div>

  }).join('');

  return coach(`Maintenant, <b>5 idées libres.</b> Sans filtre, sans jugement.<br><br>Écris les premières idées qui te viennent. Puis évalue chacune sur 4 critères (1 = faible, 5 = excellent). L'idée avec le <b>meilleur score</b> sera ta candidate principale.`) +
  `<div class="content">
    ${ideasHtml}
  </div>` +
  nav('p1Back','p1Next','Choisir mon idée →');
}

window.saveIdeaText = function(i,v){ S.p1.ideas[i]=v; save(); };
window.setStar = function(i,k,v){ S.p1.ideaScores[i][k]=v; save(); render(); };

// P1 Step 6: Choose final idea
function renderP1S6(){
  // Detect sector from angles + ideas text
  const combined = (S.p1.a1+' '+S.p1.a2+' '+S.p1.a3+' '+(S.p1.ideas.join(' '))).toLowerCase();
  const sector = getSector(combined);
  S.p1.sector = sector;

  // User's own ideas sorted by score (non-empty only)
  const userIdeas = S.p1.ideaScores
    .map((sc,i)=>({total:sc.t+sc.c+sc.s+sc.d, name:S.p1.ideas[i]||''}))
    .filter(x=>x.name.trim())
    .sort((a,b)=>b.total-a.total);

  const sectorIdeas = SECTOR_IDEAS[sector] || SECTOR_IDEAS.default;
  const chosen = S.p1.chosenSuggestion;

  // Fallback BONUS 2: show when sector unclear, best score weak, or few ideas entered
  const bestScore = userIdeas.length ? userIdeas[0].total : 0;
  const showBonus2 = sector === 'default' || bestScore < 8 || userIdeas.length < 2;

  const userIdeasHtml = userIdeas.length ? `
    <div class="card">
      <div class="ctitle">Tes idées — classées par score</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:8px">Basées sur tes propres évaluations ci-dessus</div>
      ${userIdeas.map((idea,i)=>`
        <div class="idea-card ${S.p1.chosenIdea===idea.name?'sel':''}" onclick="chooseOwnIdea(${i})">
          <div class="idea-name">${S.p1.chosenIdea===idea.name?'✓ ':''} ${idea.name}</div>
          <div class="idea-desc">Score : <b style="color:${idea.total>=14?'var(--ok)':idea.total>=8?'var(--gold)':'var(--err)'}">${idea.total}/20</b></div>
        </div>
      `).join('')}
    </div>` : '';

  return coach(`Voici <b>tes propres idées classées</b> par score, et des suggestions additionnelles pour ton secteur.<br><br>Choisis l'idée qui te donne envie d'agir <i>aujourd'hui</i>. Tu peux aussi écrire une idée différente.`) +
  `<div class="content">
    ${userIdeasHtml}
    <div class="card">
      <div class="ctitle">Suggestions additionnelles — ${sector}</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:8px">Idées compatibles avec tes angles (${sector})</div>
      ${sectorIdeas.map((idea,i)=>`
        <div class="idea-card ${chosen===i&&!userIdeas.find(u=>S.p1.chosenIdea===u.name)?'sel':''}" onclick="chooseSuggestion(${i})">
          <div class="idea-name">${chosen===i&&!userIdeas.find(u=>S.p1.chosenIdea===u.name)?'✓ ':''} ${idea.nom}</div>
          <div class="idea-desc">${idea.desc}</div>
          <div class="idea-tool">🔧 ${idea.outils}</div>
        </div>
      `).join('')}
    </div>
    ${showBonus2 ? `
    <div class="card" style="border-color:var(--muted);opacity:0.9">
      <div class="ctitle">💡 Inspiration complémentaire</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:8px">Des idées éprouvées en Afrique francophone — à utiliser si aucune idée ne te convainc encore. Elles ne remplacent pas tes propres idées.</div>
      ${BONUS2_IDEAS.map((idea,i)=>`
        <div class="idea-card ${S.p1.chosenIdea===idea.nom?'sel':''}" onclick="chooseBonus2Idea(${i})">
          <div class="idea-name">${S.p1.chosenIdea===idea.nom?'✓ ':''} ${idea.nom}</div>
          <div class="idea-desc">${idea.desc}</div>
          <div class="idea-tool">🔧 ${idea.outils}</div>
        </div>
      `).join('')}
    </div>` : ''}
    <div class="card">
      <div class="ctitle">Ou écris une idée différente</div>
      <textarea id="customIdea" placeholder="Décris ton idée en 1-2 phrases claires..." style="min-height:65px">${S.p1.customIdea}</textarea>
      <button class="btn btn-outline btn-sm" style="margin-top:8px" onclick="useCustomIdea()">Utiliser cette idée →</button>
    </div>
    ${S.p1.chosenIdea ? `<div class="badge badge-ok" style="display:block;text-align:center;padding:10px">✓ Idée choisie : ${S.p1.chosenIdea}</div>` : ''}
  </div>` +
  nav('p1Back','validateP1','Valider mon idée →', !S.p1.chosenIdea);
}

window.chooseOwnIdea = function(idx){
  const userIdeas = S.p1.ideaScores
    .map((sc,i)=>({total:sc.t+sc.c+sc.s+sc.d,name:S.p1.ideas[i]||''}))
    .filter(x=>x.name.trim())
    .sort((a,b)=>b.total-a.total);
  if(userIdeas[idx]){
    S.p1.chosenIdea = userIdeas[idx].name;
    S.p1.chosenSuggestion = -1;
    S.p1.customIdea = '';
    save(); render();
  }
};

window.chooseSuggestion = function(i){
  const sector = S.p1.sector;
  const suggestions = SECTOR_IDEAS[sector] || SECTOR_IDEAS.default;
  S.p1.chosenSuggestion = i;
  S.p1.chosenIdea = suggestions[i].nom;
  S.p1.customIdea = '';
  save(); render();
};

window.chooseBonus2Idea = function(i){
  S.p1.chosenIdea = BONUS2_IDEAS[i].nom;
  S.p1.chosenSuggestion = -1;
  S.p1.customIdea = '';
  save(); render();
};

window.useCustomIdea = function(){
  const v = document.getElementById('customIdea')?.value.trim();
  if(!v){toast('Écris ton idée d\'abord'); return;}
  S.p1.customIdea = v;
  S.p1.chosenIdea = v;
  S.p1.chosenSuggestion = -1;
  save(); render();
};

window.validateP1 = function(){
  if(!S.p1.chosenIdea){toast('Choisis une idée pour continuer'); return;}
  go('p2');
};

window.p1Next = function(){
  capP1();
  const s = S.p1.step;
  // Validate
  if(s===1 && !S.p1.fear.trim()){toast('Réponds à la première question pour continuer'); return;}
  if(s===4 && !S.p1.a1.trim() && !S.p1.a2.trim()){toast('Remplis au moins les 2 premiers angles'); return;}
  if(s < P1_STEPS-1){ S.p1.step++; save(); render(); }
};

window.p1Back = function(){
  capP1();
  if(S.p1.step > 0){ S.p1.step--; save(); render(); }
  else { go('quiz-result'); }
};

function capP1(){
  // Capture all current inputs
  const gets = id => document.getElementById(id)?.value||'';
  if(S.p1.step===1){ S.p1.fear=gets('fear'); S.p1.maintain=gets('maintain'); S.p1.bigFear=gets('bigFear'); }
  if(S.p1.step===2){ S.p1.truths=[gets('truth0'),gets('truth1'),gets('truth2')]; S.p1.choice=gets('choice'); }
  if(S.p1.step===3){ S.p1.beliefs=[gets('belief0'),gets('belief1'),gets('belief2')]; }
  if(S.p1.step===4){ S.p1.a1=gets('a1'); S.p1.a2=gets('a2'); S.p1.a3=gets('a3'); }
  if(S.p1.step===5){ S.p1.ideas=[gets('idea0'),gets('idea1'),gets('idea2'),gets('idea3'),gets('idea4')]; }
  if(S.p1.step===6){ S.p1.customIdea=gets('customIdea'); }
  save();
}

// P2 Step 3: Checklist 25 points
function renderP2S3(){
  const chk = S.p2.checklist;
  let idx = 0;
  let total = Object.values(chk).filter(Boolean).length;
  const pct = Math.round((total/25)*100);
  let color = pct>=80?'var(--ok)':pct>=60?'var(--gold)':'var(--err)';
  let verdict = pct>=80?'✅ Solide — tu es prêt à démarrer':pct>=60?'⚡ Bon potentiel — quelques ajustements':pct>=40?'⚠️ À reformuler avant de continuer':'❌ Retourne à la découverte de ton idée';

  let html = `<div class="cl-score-bar"><div class="cl-score-fill" style="width:${pct}%"></div></div>
    <div class="cl-score-label" style="color:${color}">${total}/25 — ${verdict}</div>`;

  CHECKLIST.forEach(cat=>{
    html += `<div class="cl-cat">${cat.cat}</div>`;
    cat.items.forEach(item=>{
      const i = idx++;
      const checked = !!chk[i];
      html += `<div class="cl-item ${checked?'chk':''}" onclick="toggleCheck(${i})">
        <div class="cl-box">${checked?'✓':''}</div>
        <div class="cl-text">${item}</div>
      </div>`;
    });
  });

  return coach(`La <b>Checklist Premium 25 points</b>. Coche honnêtement chaque critère que tu remplis.<br><br><b>20+/25</b> = tu es prêt. <b>15-19</b> = ajuste. <b>-15</b> = reformule ton idée.`) +
  `<div class="content">
    <div class="card">
      <div class="ctitle">Checklist 25 critères</div>
      ${html}
    </div>
  </div>` +
  nav('p2Back','p2Next','Continuer →');
}

window.toggleAction = function(wi,ai){

  save(); render(true); // keepScroll
};

window.updateOfferPreview = function(){
  const a=document.getElementById('audience')?.value||'...';
  const s=document.getElementById('service')?.value||'...';
  const b=document.getElementById('benefit')?.value||'';
  const el=document.getElementById('offerPreview');
  if(el) el.textContent="J'aide "+a+" à "+s+(b?' — pour '+b:'')+'.';
};

window.p2Next = function(){
  capP2();
  const s = S.p2.step;
  if(s===1 && !S.p2.audience){toast('Remplis les champs de ton offre'); return;}
  if(s===3){
    const total = Object.values(S.p2.checklist).filter(Boolean).length;
    if(total < 15){toast('Score trop bas ('+total+'/25) — minimum requis : 15/25. Revois ton idée ou affine ton offre avant de continuer.'); return;}
    if(total < 20){toast('⚠️ Score '+total+'/25 — Plan B viable mais perfectible. Identifie les critères faibles et ajuste avant de lancer.'); }
  }
  if(s < P2_STEPS-1){ S.p2.step++; save(); render(); }
};

window.p2Back = function(){
  capP2();
  if(S.p2.step > 0){ S.p2.step--; save(); render(); }
  else { go('p1'); S.p1.step=6; save(); render(); }
};

window.validateP2 = function(){
  capP2();
  if(!S.p2.contacts[0]){toast('Nomme au moins ton 1er contact'); return;}
  go('p3-engage');
};

function capP2(){
  const gets = id => document.getElementById(id)?.value||'';
  if(S.p2.step===1){ S.p2.audience=gets('audience'); S.p2.service=gets('service'); S.p2.benefit=gets('benefit'); S.p2.price=gets('price'); }
  if(S.p2.step===2){ S.p2.audience=gets('audienceDetail')||S.p2.audience; S.p2.benefit=gets('benefitDetail')||S.p2.benefit; S.p2.offerSentence=gets('whyMe'); }
  if(S.p2.step===4){ S.p2.mvp24=gets('mvp24'); S.p2.mvp72=gets('mvp72'); S.p2.mvpWeek=gets('mvpWeek'); }
  if(S.p2.step===5){ S.p2.contacts=[gets('contact0'),gets('contact1'),gets('contact2'),gets('contact3'),gets('contact4')]; }
  save();
}

  const alreadyFilled = e.goal30 || e.goal60 || e.goal90;

  if(alreadyFilled){
    return topbar('Engagement 90 jours','Phase 3 — 90 Jours',60) +
    coach(`Tu as déjà posé tes objectifs. Rappel de ton engagement avant de commencer.`) +
    `<div class="content">
      <div class="card">
        <div class="ctitle">Tes objectifs 90 jours</div>
        <div class="prof-row"><span class="prof-label">30 jours</span><strong class="prof-value">${e.goal30||'—'}</strong></div>

    </div>` +
    `<div class="nav no-print"><button class="btn btn-gold" onclick="go('p3')">Commencer le Plan 90 jours →</button></div>`;
  }

  return topbar('Engagement 90 jours','Phase 3 — 90 Jours',60) +
  coach(`Avant de commencer ton plan d'exécution, pose tes <b>3 objectifs clés</b> et signe ton engagement.<br><br>Ce n'est pas un exercice — c'est un contrat avec toi-même. Sois précis et réaliste.`) +
  `<div class="content">
    <div class="card">
      <div class="ctitle">Tes objectifs par période</div>
      <label>Objectif 30 jours <span style="color:var(--muted);font-size:11px">(1ère vente ? montant ? nombre de contacts ?)</span></label>
      <textarea id="eng30" placeholder="Ex: Encaisser mon premier paiement, même petit..." style="min-height:55px">${e.goal30}</textarea>
      <label style="margin-top:10px">Objectif 60 jours <span style="color:var(--muted);font-size:11px">(stabiliser ? répéter ?)</span></label>
      <textarea id="eng60" placeholder="Ex: Avoir 3 clients réguliers et un process clair..." style="min-height:55px">${e.goal60}</textarea>
      <label style="margin-top:10px">Objectif 90 jours <span style="color:var(--muted);font-size:11px">(revenu cible ? vision ?)</span></label>
      <textarea id="eng90" placeholder="Ex: Générer 50 000 FCFA/mois et préparer le cycle suivant..." style="min-height:55px">${e.goal90}</textarea>

window.submitEngage = function(){
  if(!S.p3.engage) S.p3.engage = {goal30:'',goal60:'',goal90:'',commitment:''};
  const g30 = document.getElementById('eng30')?.value.trim()||'';
  const g60 = document.getElementById('eng60')?.value.trim()||'';
  const g90 = document.getElementById('eng90')?.value.trim()||'';
  const com = document.getElementById('engCommit')?.value.trim()||'';
  if(!g30){toast('Remplis au moins ton objectif 30 jours'); return;}
  S.p3.engage = {goal30:g30, goal60:g60, goal90:g90, commitment:com};
  save(); go('p3');
};

function renderP3Hub(){
  const unlocked = S.p3.unlocked;
  const wd = S.p3.weekData;
  const totalSales = getTotalSales();

  return topbar('Plan 90 jours','Phase 3 — 90 Jours',60+Math.round((unlocked-1)/12*30)) +
  coach(`Ton plan d'exécution. <b>12 semaines, une par une.</b><br><br>Chaque semaine a un objectif précis et un KPI minimum. Tu ne passes pas à la suivante sans avoir avancé.<br><br>Idée : <i>${S.p1.chosenIdea}</i> | Ventes cumulées : <b>${totalSales}</b>`) +
  `<div class="content">
    ${[1,2,3].map(phase=>{
      const phaseNames = {1:'Phase 1 — Lancer (J1-J30)',2:'Phase 2 — Structurer (J31-J60)',3:'Phase 3 — Optimiser (J61-J90)'};
      const weekRange = {1:[1,2,3,4],2:[5,6,7,8],3:[9,10,11,12]};
      return `<div><div style="font-size:11px;color:var(--gold);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin:10px 0 6px">${phaseNames[phase]}</div>
      <div class="week-grid">${weekRange[phase].map(n=>{
        const w = WEEKS[n-1];
        const isDone = wd[n]?.done;
        const isActive = n===unlocked && !isDone;
        const isLocked = n>unlocked;
        const kpiVal = wd[n]?.kpiValue;
        return `<div class="wcard ${isDone?'done':isActive?'active':isLocked?'locked':''}" onclick="${isLocked?'':'openWeek('+n+')'}">
          <div class="wnum">${isDone?'✓':n}</div>
          <div class="winfo">
            <div class="wtitle">S${n} — ${w.title}</div>
            <div class="wphase">${w.phase}</div>
            ${isDone?`<div class="wstatus">✓ ${kpiVal!==undefined?kpiVal+' '+w.kpiUnit:'Terminée'}</div>`:isActive?`<div class="wkpi">KPI : ${w.kpiUnit}</div>`:''}
          </div>
          ${isLocked?'<span style="font-size:16px;color:var(--muted)">🔒</span>':isDone?'<span style="font-size:16px;color:var(--ok)">✓</span>':'<span style="font-size:16px;color:var(--gold)">→</span>'}
        </div>`;
      }).join('')}</div></div>`;
    }).join('')}
    <div class="card" style="background:#0a1520">
      <div class="ctitle">Tableau de bord</div>
      <button class="btn btn-outline" onclick="go('p4')">📊 Voir mes statistiques →</button>
    </div>
    ${S.p3.unlocked>11&&wd[12]?.done?`<button class="btn btn-gold" onclick="go('p5')">🏆 Voir mon rapport final →</button>`:''}
  </div>`;
}

function getTotalSales(){
  const wd = S.p3.weekData;
  // Check week 5 cumulative
  if(wd[5]?.kpiValue) return wd[5].kpiValue;
  if(wd[4]?.done) return 1;
  return 0;
}

window.openWeek = function(n){
  S.p3.week = n;
  if(!S.p3.weekData[n]) S.p3.weekData[n] = {actionsDone:[]};
  S.screen = 'p3-week';
  save(); render();
};

function renderP3Week(){
  const n = S.p3.week;
  const w = WEEKS[n-1];
  const wd = S.p3.weekData[n] || {};
  const isDone = wd.done;
  const pct = 60+Math.round((n/12)*30);
  const actionsDone = wd.actionsDone || [];
  const actionsCount = actionsDone.filter(Boolean).length;

  // Actions avec cases à cocher
  const actionsHtml = `<div class="card">
    <div class="ctitle">Actions de la semaine <span style="color:var(--muted);font-weight:400">${actionsCount}/${w.actions.length} faites</span></div>
    ${w.actions.map((a,i)=>`
      <div class="action-item ${actionsDone[i]?'done':''}" onclick="${isDone?'':'toggleAction('+n+','+i+')'}">
        <div class="abox">${actionsDone[i]?'✓':''}</div>
        <div class="atext">${a}</div>
      </div>
    `).join('')}
  </div>`;

  // KPI input
  let kpiHtml = '';
  if(!isDone){
    if(w.kpiType==='number'){
      kpiHtml = `<div class="card" style="border-color:var(--gold)">
        <div class="ctitle" style="color:var(--gold)">KPI Semaine ${n} — ${w.kpiUnit}</div>
        <label>${w.kpiQ}</label>
        <input type="number" id="kpiInput" value="${wd.kpiValue||''}" min="0" placeholder="0">
      </div>`;
    } else {
      const boolVal = wd.kpiValue;
      kpiHtml = `<div class="card" style="border-color:var(--gold)">
        <div class="ctitle" style="color:var(--gold)">KPI Semaine ${n} — ${w.kpiUnit}</div>
        <label>${w.kpiQ}</label>
        <div class="bool-row">
          <button class="bool-btn yes ${boolVal===true?'sel':''}" onclick="setBool(true)">✓ Oui</button>
          <button class="bool-btn no ${boolVal===false?'sel':''}" onclick="setBool(false)">✗ Pas encore</button>
        </div>
      </div>`;
    }
  }

  // Champs spécifiques selon la semaine
  let weekSpecific = '';
  if(!isDone){
    if(n===4){
      weekSpecific = `<div class="card">
        <div class="ctitle" style="color:var(--ok)">Première vente</div>
        <label>Montant encaissé :</label>
        <input type="text" id="saleAmount" value="${wd.saleAmount||''}" placeholder="Ex: 5 000 FCFA, 10 000 FCFA...">
      </div>`;
    }
    if(n===7){
      weekSpecific = `<div class="card" style="border-color:var(--gold)">
        <div class="ctitle">Suivi revenus — accès rapide</div>
        <div style="font-size:13px;color:var(--muted);margin-bottom:8px">Commence à séparer tes revenus Plan B de tes dépenses personnelles dès maintenant.</div>
        <button class="btn btn-outline btn-sm" onclick="go('p4')">📊 Ouvrir le tableau de bord →</button>
      </div>
      <div class="card">
        <div class="ctitle">Mon message de présentation</div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:6px">Formule en 2-3 lignes maximum. À copier sur WhatsApp.</div>
        <textarea id="presentationMsg" placeholder='Ex: "Je fais [X] pour [qui]. Résultat : [bénéfice]. Contacte-moi si tu es intéressé(e)."' style="min-height:75px">${wd.presentationMsg||''}</textarea>
      </div>`;
    }
    if(n===8){
      weekSpecific = `<div class="card" style="border-color:var(--gold)">
        <div class="ctitle">Ton message de présentation — Version finale</div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:6px">Version améliorée basée sur les retours reçus cette semaine. Doit tenir en 2-3 lignes.</div>
        <textarea id="presentationMsg" placeholder="Version finale de ton message de présentation..." style="min-height:75px">${wd.presentationMsg||''}</textarea>
        ${S.p3.weekData[7]?.presentationMsg?`<div style="margin-top:8px">
          <div style="font-size:11px;color:var(--muted);margin-bottom:4px">Ton message de la semaine 7 :</div>
          <div class="msg-preview">${S.p3.weekData[7].presentationMsg}</div>
        </div>`:''}
        <div style="font-size:12px;color:var(--muted);margin-top:8px">Format validé : <i>"J'aide [QUI] à [QUOI] — sans [OBSTACLE]. [Comment me contacter]"</i></div>
      </div>`;
    }
  }

  // Notes input
  const notesHtml = `<div class="card">
    <div class="ctitle">Mes notes & réflexions</div>
    <label>Ce qui s'est bien passé :</label>
    <textarea id="weekNotesOK" placeholder="Qu'est-ce qui a fonctionné cette semaine ?" style="min-height:55px">${wd.notesOK||''}</textarea>
    <label>Ce qui m'a bloqué ou surpris :</label>
    <textarea id="weekNotes" placeholder="Blocages, apprentissages, ajustements..." style="min-height:55px">${wd.notes||''}</textarea>
  </div>`;

  // Si terminée : message coach
  let doneHtml = '';
  if(isDone){
    const metKpi = w.kpiType==='number' ? (wd.kpiValue||0)>=w.kpiMin : wd.kpiValue===true;
    doneHtml = `<div class="card" style="background:${metKpi?'#1b3a1b':'#1e1a0a'};border-color:${metKpi?'var(--ok)':'var(--gold)'}">
      <div class="ctitle" style="color:${metKpi?'var(--ok)':'var(--gold)'}">${metKpi?'🎯 KPI atteint !':'💡 Plan de secours'}</div>
      <div style="font-size:13.5px;line-height:1.65">${metKpi?w.coachOK:w.coachKO}</div>
    </div>`;
    if(!metKpi){
      if(n===4){
        doneHtml += `<div class="secours">
          <div class="secours-title">🔍 Diagnostic — Pas encore de vente après 30 jours :</div>
          <ul>
            <li>As-tu contacté au moins 10 personnes en direct ?</li>
            <li>Ton offre est-elle claire en 1 phrase ?</li>
            <li>Ton prix est-il adapté à ta cible ?</li>
            <li>As-tu vraiment proposé, ou seulement publié ?</li>
          </ul>
          <div class="secours-title" style="margin-top:10px">📋 Actions correctives :</div>
          <ul>
            <li>Envoie 5 messages personnalisés supplémentaires aujourd'hui</li>
            <li>Simplifie ton offre à l'essentiel — enlève tout ce qui est flou</li>
            <li>Ajuste le prix temporairement (vente test à prix réduit)</li>
            <li>Reformule ton message : <i>"J'aide [QUI] à [RÉSULTAT] — intéressé ?"</i></li>
          </ul>
          <div style="margin-top:8px;font-size:12.5px;color:var(--gold2)">Tu n'as pas échoué. Tu ajustes. Continue.</div>
        </div>`;
      } else {
        doneHtml += `<div class="secours">
          <div class="secours-title">📋 Actions correctives :</div>
          <ul>
            <li>Augmente le volume de contacts</li>
            <li>Simplifie ton offre à l'essentiel</li>
            <li>Utilise le script WhatsApp de départ</li>
            <li>Baisse temporairement le prix si nécessaire</li>
          </ul>
        </div>`;
      }
    }
    // Afficher les notes enregistrées
    if(wd.notes||wd.notesOK){
      doneHtml += `<div class="card">
        <div class="ctitle">Tes notes — Semaine ${n}</div>
        ${wd.notesOK?`<div style="font-size:12px;color:var(--muted);margin-bottom:2px">✅ Ce qui a marché :</div><div style="font-size:13px;margin-bottom:8px">${wd.notesOK}</div>`:''}
        ${wd.notes?`<div style="font-size:12px;color:var(--muted);margin-bottom:2px">🔧 Blocages :</div><div style="font-size:13px">${wd.notes}</div>`:''}
      </div>`;
    }
    if(wd.presentationMsg && (n===7||n===8)){
      doneHtml += `<div class="card">
        <div class="ctitle">Ton message de présentation</div>
        <div class="msg-preview">${wd.presentationMsg}</div>
      </div>`;
    }
  }

  return topbar(`Semaine ${n}`,w.phase,pct) +
  coach(isDone ? `Semaine ${n} terminée — ${w.title}.` : `<b>Semaine ${n} — ${w.title}</b><br><br><i>${w.obj}</i>`) +
  `<div class="content">
    <div class="card">
      <div class="ctitle">Objectif de la semaine</div>
      <div style="font-size:14px;color:var(--gold2);font-weight:600">${w.obj}</div>
    </div>
    ${actionsHtml}
    ${kpiHtml}
    ${weekSpecific}
    ${isDone ? doneHtml : notesHtml}
  </div>` +
  `<div class="nav no-print">
    <button class="btn btn-muted btn-sm" onclick="backToHub()">← Hub</button>
    ${!isDone?`<button class="btn btn-gold" onclick="submitWeek(${n})">Valider S${n} →</button>`:''}
    ${isDone&&n<12?`<button class="btn btn-gold" onclick="goNextWeek(${n})">Semaine ${n+1} →</button>`:''}
    ${isDone&&n===12?`<button class="btn btn-gold" onclick="go('p5')">Rapport final →</button>`:''}
  </div>`;
}

window.setBool = function(v){
  if(!S.p3.weekData[S.p3.week]) S.p3.weekData[S.p3.week]={};
  S.p3.weekData[S.p3.week].kpiValue = v;
  save(); render();
};

window.submitWeek = function(n){
  const w = WEEKS[n-1];
  let kpiVal;
  if(w.kpiType==='number'){
    const v = document.getElementById('kpiInput')?.value;
    kpiVal = v!==''&&v!==null&&v!==undefined ? parseInt(v) : undefined;
    if(kpiVal===undefined){toast('Indique ton résultat KPI (même si c\'est 0)'); return;}
  } else {
    kpiVal = S.p3.weekData[n]?.kpiValue;
    if(kpiVal===undefined){toast('Réponds au KPI — Oui ou Pas encore'); return;}
  }

  if(!S.p3.weekData[n]) S.p3.weekData[n]={};
  S.p3.weekData[n].kpiValue = kpiVal;
  S.p3.weekData[n].notes = document.getElementById('weekNotes')?.value||'';
  S.p3.weekData[n].notesOK = document.getElementById('weekNotesOK')?.value||'';
  S.p3.weekData[n].done = true;

  if(n===4){
    const sa = document.getElementById('saleAmount')?.value||'';
    if(sa) S.p3.weekData[n].saleAmount = sa;
  }
  if(n===7||n===8){
    const pm = document.getElementById('presentationMsg')?.value||'';
    if(pm) S.p3.weekData[n].presentationMsg = pm;
  }

  // Unlock next week
  if(n >= S.p3.unlocked && n < 12){
    S.p3.unlocked = n+1;
  } else if(n===12){
    S.p3.unlocked = 12;
    S.completed = true;
  }

  save(); render();
};

window.goNextWeek = function(n){
  S.p3.week = n+1;
  if(!S.p3.weekData[n+1]) S.p3.weekData[n+1] = {actionsDone:[]};
  save(); render();
};

window.backToHub = function(){
  S.screen = 'p3';
  save(); render();
};

/* ════════════════════════════════════════
   PHASE 4 — TABLEAU DE BORD
════════════════════════════════════════ */
function renderP4(){
  const revs = S.p4.revenues;
  const totalRev = revs.reduce((a,r)=>a+(parseFloat(r.rev)||0),0);
  const totalDep = revs.reduce((a,r)=>a+(parseFloat(r.dep)||0),0);
  const net = totalRev - totalDep;
  const wd = S.p3.weekData;

  // Statistiques progression
  const weeksCompleted = Object.values(wd).filter(w=>w.done).length;
  const kpisMet = WEEKS.filter((w,i)=>{
    const d=wd[w.n]; if(!d?.done) return false;
    return w.kpiType==='number'?(d.kpiValue||0)>=w.kpiMin:d.kpiValue===true;
  }).length;
  const actions_total = WEEKS.slice(0,weeksCompleted).reduce((a,w)=>a+w.actions.length,0);
  const actions_done = Object.entries(wd).reduce((a,[k,v])=>a+((v.actionsDone||[]).filter(Boolean).length),0);
  const hasFirstSale = wd[4]?.kpiValue===true;
  const currentWeek = S.p3.unlocked;

  // Tableau revenus
  let tableHtml = '';
  if(revs.length>0){
    tableHtml = `<div class="rev-row">
      <div class="rev-cell hdr">Mois</div>
      <div class="rev-cell hdr">Revenus</div>
      <div class="rev-cell hdr">Dépenses</div>
      <div class="rev-cell hdr">Net</div>
    </div>`;
    revs.forEach((r,i)=>{
      const n=(parseFloat(r.rev)||0)-(parseFloat(r.dep)||0);
      tableHtml+=`<div class="rev-row">
        <div class="rev-cell">${r.month||'—'}</div>
        <div class="rev-cell">${parseFloat(r.rev||0).toLocaleString()}</div>
        <div class="rev-cell">${parseFloat(r.dep||0).toLocaleString()}</div>
        <div class="rev-cell rev-total" style="color:${n>=0?'var(--ok)':'var(--err)'}">${n.toLocaleString()}</div>
      </div>`;
    });
    tableHtml+=`<div class="rev-row">
      <div class="rev-cell hdr">TOTAL</div>
      <div class="rev-cell rev-total">${totalRev.toLocaleString()}</div>
      <div class="rev-cell rev-total">${totalDep.toLocaleString()}</div>
      <div class="rev-cell rev-total" style="color:${net>=0?'var(--ok)':'var(--err)'}">${net.toLocaleString()}</div>
    </div>`;
  }

  // Message de présentation final (S8 ou S7)
  const msgPres = wd[8]?.presentationMsg || wd[7]?.presentationMsg || '';

  return topbar('Tableau de bord','Dashboard',90) +
  coach(`Ton <b>tableau de bord Plan B</b>. Suis ta progression, tes revenus et tes actions semaine par semaine.`) +
  `<div class="content">

    <div class="card">
      <div class="ctitle">Progression globale</div>
      <div class="stat-grid">
        <div class="stat-box">
          <div class="stat-num">${currentWeek}/12</div>
          <div class="stat-label">Semaine en cours</div>
        </div>
        <div class="stat-box ${weeksCompleted>0?'ok':''}">
          <div class="stat-num">${weeksCompleted}</div>
          <div class="stat-label">Semaines terminées</div>
        </div>
        <div class="stat-box ${kpisMet>0?'ok':''}">
          <div class="stat-num">${kpisMet}/${weeksCompleted||'—'}</div>
          <div class="stat-label">KPIs atteints</div>
        </div>
        <div class="stat-box ${actions_done>0?'ok':''}">
          <div class="stat-num">${actions_done}/${actions_total||'—'}</div>
          <div class="stat-label">Actions faites</div>
        </div>
      </div>
      <div style="margin-top:10px">
        <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:4px">
          <span>Progression 90 jours</span>
          <span>${Math.round((weeksCompleted/12)*100)}%</span>
        </div>
        <div class="cl-score-bar"><div class="cl-score-fill" style="width:${Math.round((weeksCompleted/12)*100)}%"></div></div>
      </div>
    </div>

    <div class="card">
      <div class="ctitle">Mon Plan B</div>
      ${S.p1.chosenIdea?`<div class="prof-row"><span class="prof-label">Idée</span><strong class="prof-value">${S.p1.chosenIdea}</strong></div>`:''}
      ${S.p2.audience?`<div class="prof-row"><span class="prof-label">J'aide</span><strong class="prof-value">${S.p2.audience}</strong></div>`:''}
      ${S.p2.price?`<div class="prof-row"><span class="prof-label">Prix</span><strong class="prof-value">${S.p2.price}</strong></div>`:''}
      <div class="prof-row"><span class="prof-label">1ère vente</span><strong class="prof-value" style="color:${hasFirstSale?'var(--ok)':'var(--muted)'}">${hasFirstSale?'✓ '+(wd[4]?.saleAmount||'Réalisée'):'Pas encore'}</strong></div>
    </div>

    ${msgPres?`<div class="card">
      <div class="ctitle">Mon message de présentation</div>
      <div class="msg-preview">${msgPres}</div>
    </div>`:''}

    <div class="card">
      <div class="ctitle">Résultats financiers (FCFA)</div>
      <div class="stat-grid" style="margin-bottom:10px">
        <div class="stat-box ok">
          <div class="stat-num" style="font-size:18px">${totalRev.toLocaleString()}</div>
          <div class="stat-label">Total revenus</div>
        </div>
        <div class="stat-box ${net>=0?'ok':''}">
          <div class="stat-num" style="font-size:18px;color:${net>=0?'var(--ok)':'var(--err)'}">${net.toLocaleString()}</div>
          <div class="stat-label">Bénéfice net</div>
        </div>
      </div>
      ${revs.length>0?tableHtml:`<div style="color:var(--muted);font-size:13px;text-align:center;padding:8px">Aucune entrée — ajoute tes revenus ci-dessous</div>`}
    </div>

    <div class="card">
      <div class="ctitle">Ajouter une entrée mensuelle</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:8px">
        <div><label>Mois</label><input type="text" id="revMonth" placeholder="Ex: Avril"></div>
        <div><label>Revenus</label><input type="number" id="revAmt" placeholder="0"></div>
        <div><label>Dépenses</label><input type="number" id="depAmt" placeholder="0"></div>
      </div>
      <button class="btn btn-outline btn-sm" onclick="addRevenue()">+ Ajouter</button>
    </div>

    <div class="card" style="background:#0a1520">
      <div class="ctitle">Contacts identifiés</div>
      ${S.p2.contacts.filter(Boolean).map((c,i)=>`<div class="prof-row"><span class="prof-label">${i+1}.</span><strong class="prof-value">${c}</strong></div>`).join('')||`<div style="color:var(--muted);font-size:13px">À remplir dans Phase 2</div>`}
    </div>

  </div>` +
  `<div class="nav no-print"><button class="btn btn-outline" onclick="p4Back()">← Plan 90 jours</button></div>`;
}

window.p4Back = function(){ go('p3'); };

window.addRevenue = function(){
  const month = document.getElementById('revMonth')?.value.trim();
  const rev = document.getElementById('revAmt')?.value||'0';
  const dep = document.getElementById('depAmt')?.value||'0';
  if(!month){toast('Indique le mois'); return;}
  S.p4.revenues.push({month,rev,dep});
  save(); render();
};

/* ════════════════════════════════════════
   PHASE 5 — RAPPORT FINAL
════════════════════════════════════════ */
function renderP5(){
  const wd = S.p3.weekData;
  const totalRevenu = S.p4.revenues.reduce((a,r)=>a+(parseFloat(r.rev)||0),0);
  const totalNet = S.p4.revenues.reduce((a,r)=>a+(parseFloat(r.rev)||0)-(parseFloat(r.dep)||0),0);
  const weeksCompleted = Object.values(wd).filter(w=>w.done).length;
  const kpisMet = WEEKS.filter((w,i)=>{
    const d=wd[w.n];
    if(!d?.done) return false;
    if(w.kpiType==='number') return (d.kpiValue||0)>=w.kpiMin;
    return d.kpiValue===true;
  }).length;

  return topbar('Rapport Final','Phase 5 — Rapport',100) +
  coach(`<b>Tu as terminé les 90 jours.</b><br><br>Ce rapport résume tout ce que tu as construit. C'est la preuve tangible de ton travail. Garde-le. Reviens y dans 6 mois pour mesurer chemin parcouru.`) +
  `<div class="content">
    <div style="text-align:center;margin-bottom:8px">
      <div style="font-size:36px">🏆</div>
      <div style="font-size:20px;font-weight:800;color:var(--gold2);margin-bottom:4px">Plan B Complété</div>
      <div class="badge badge-ok" style="display:inline-block">90 jours — Mission accomplie</div>
    </div>

    <div class="rep-section">
      <div class="rep-title">Mon Plan B</div>
      <div class="rep-row"><span>Idée choisie</span><strong>${S.p1.chosenIdea||'—'}</strong></div>
      <div class="rep-row"><span>Offre</span><strong>${S.p2.audience&&S.p2.service?'J\'aide '+S.p2.audience+' à '+S.p2.service:'—'}</strong></div>
      <div class="rep-row"><span>Prix</span><strong>${S.p2.price||'—'}</strong></div>
    </div>

    <div class="rep-section">
      <div class="rep-title">Résultats des 90 jours</div>
      <div class="rep-row"><span>Semaines complétées</span><strong>${weeksCompleted}/12</strong></div>
      <div class="rep-row"><span>KPIs atteints</span><strong>${kpisMet}/12</strong></div>
      <div class="rep-row"><span>Revenus totaux</span><strong style="color:var(--ok)">${totalRevenu.toFixed(0)} FCFA</strong></div>
      <div class="rep-row"><span>Bénéfice net</span><strong style="color:${totalNet>=0?'var(--ok)':'var(--err)'}">${totalNet.toFixed(0)} FCFA</strong></div>
    </div>

    <div class="rep-section">
      <div class="rep-title">Mon parcours — Moments clés</div>
      ${wd[4]?.done?`<div class="rep-row"><span>1ère vente</span><strong style="color:var(--ok)">${wd[4].saleAmount||'Réalisée ✓'}</strong></div>`:''}
      ${wd[6]?.done?`<div class="rep-row"><span>1ère recommandation</span><strong style="color:var(--ok)">${wd[6].kpiValue===true?'✓ Reçue':'Pas encore'}</strong></div>`:''}
      ${wd[12]?.notes?`<div class="rep-row"><span>Vision 6 mois</span><strong>${wd[12].notes.substring(0,60)}...</strong></div>`:''}
    </div>

    <div class="rep-section">
      <div class="rep-title">Mon identité entrepreneuriale</div>
      <div class="rep-row"><span>Ce que je fais</span><strong>${S.p2.service||'—'}</strong></div>
      <div class="rep-row"><span>Pour qui</span><strong>${S.p2.audience||'—'}</strong></div>
      <div class="rep-row"><span>Mon atout naturel</span><strong>${S.p1.a1?S.p1.a1.substring(0,60)+'...':'—'}</strong></div>
    </div>

    <div class="card" style="background:linear-gradient(135deg,#1a2500,#0a1520);border-color:var(--gold);text-align:center;padding:20px">
      <div style="font-size:14px;color:var(--gold2);font-weight:600;line-height:1.7">"Ton futur ne dépend pas des circonstances.<br>Il dépend de ta capacité à avancer avec<br>lucidité, courage et constance."</div>
      <div style="font-size:12px;color:var(--muted);margin-top:8px">— Coach Redouane</div>
    </div>

    <div class="no-print" style="display:flex;gap:8px">
      <button class="btn btn-outline" style="flex:1" onclick="go('p3')">← Plan 90 jours</button>
      <button class="btn btn-gold" style="flex:1" onclick="window.print()">⬇ Télécharger PDF</button>
    </div>
    <div style="font-size:11px;color:var(--muted);text-align:center;margin-top:6px" class="no-print">Sur mobile : partager → Enregistrer en PDF</div>
  </div>`;
}

/* ════════════════════════════════════════
   PROFIL
════════════════════════════════════════ */
function renderProfile(){
  const p = S.profile;
  const prev = S.screen==='profile' ? 'welcome' : S.screen; // fallback
  return topbar('Profil','Mon profil',globalProgress()) +
  coach(`Ton profil d'entrepreneur. Ces informations personnalisent ton expérience dans l'app.`) +
  `<div class="content">
    <div class="card">
      <div class="ctitle">Mes informations</div>
      <label>Prénom ou nom :</label>
      <input type="text" id="profName" value="${p.name||''}" placeholder="Ex: Redouane">
      <label>Ville / Pays :</label>
      <input type="text" id="profCity" value="${p.city||''}" placeholder="Ex: Douala, Abidjan, Paris...">
      <label>Date de démarrage :</label>
      <input type="text" id="profDate" value="${p.startDate||''}" placeholder="Ex: 18 avril 2026">
      <label>Mon Heure d'Or quotidienne :</label>
      <input type="text" id="profHeure" value="${p.houreor||'1h'}" placeholder="Ex: 1h30, de 6h à 7h...">
    </div>
    ${S.p1.chosenIdea?`<div class="card">
      <div class="ctitle">Mon Plan B</div>
      <div class="prof-row"><span class="prof-label">Idée</span><strong class="prof-value">${S.p1.chosenIdea}</strong></div>
      ${S.p2.audience?`<div class="prof-row"><span class="prof-label">Cible</span><strong class="prof-value">${S.p2.audience}</strong></div>`:''}
      ${S.p2.price?`<div class="prof-row"><span class="prof-label">Prix</span><strong class="prof-value">${S.p2.price}</strong></div>`:''}
      <div class="prof-row"><span class="prof-label">Progression</span><strong class="prof-value">${globalProgress()}%</strong></div>
    </div>`:''}
    <button class="btn btn-gold" onclick="saveProfile()">Sauvegarder le profil</button>
    <button class="btn btn-outline" style="margin-top:8px" onclick="go('welcome')">← Retour à l'accueil</button>
  </div>`;
}

window.saveProfile = function(){
  S.profile.name = document.getElementById('profName')?.value||'';
  S.profile.city = document.getElementById('profCity')?.value||'';
  S.profile.startDate = document.getElementById('profDate')?.value||'';
  S.profile.houreor = document.getElementById('profHeure')?.value||'1h';
  save();
  toast('Profil sauvegardé ✓');
  setTimeout(()=>{ go(S.screen==='profile'?'welcome':S.screen); },800);
};

/* ════════════════════════════════════════
   NAVIGATION UTILS
════════════════════════════════════════ */
window.go = function(screen){
  S.screen = screen;
  save(); render();
};

function toast(msg){
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 2400);
}

/* ════════════════════════════════════════
   INIT
════════════════════════════════════════ */
load();
render();   // Rendu immédiat → login screen visible sans attendre Supabase
_boot();    // Vérifie session en arrière-plan → re-render si session trouvée
</script>
</body>
</html>
